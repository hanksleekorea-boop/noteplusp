<body><p>노트플러스P v19 로컬 QA 후보를 안전하게 준비하고 있습니다…</p><noscript>이 버전은 JavaScript가 필요합니다. <a href="노트앱_v18.html">v18 열기</a></noscript>
<script>
(async function loadVersionedApp(){
  if(location.protocol==="file:"){
    document.body.innerHTML='<h1>로컬 파일에서는 Google Drive 로그인을 사용할 수 없습니다.</h1><p>Google은 <code>file:</code> 주소를 OAuth 웹 출처로 허용하지 않습니다. 기존 노트 데이터는 변경되지 않았습니다.</p><p><a href="https://hanksleekorea-boop.github.io/noteplusp/%EB%85%B8%ED%8A%B8%EC%95%B1_v18.html">공개 노트플러스P v18 열기</a></p><p>공개 HTTPS 주소에서 Google Drive 로그인을 누르세요.</p>';
    return;
  }
  const source="노트앱_v16.html",closeScriptTag="<"+"/script>";
  const oldConfig='<script src="firebase-config.js">'+closeScriptTag,newConfig='<script src="google-drive-config-v18.js">'+closeScriptTag;
  const oldCloud='<script type="module" src="noteplus-cloud-v3.js">'+closeScriptTag,newCloud='<script type="module" src="noteplus-drive-v19.js">'+closeScriptTag;
  const oldManifest='<link rel="manifest" href="noteplus.webmanifest">',newManifest='<link rel="manifest" href="noteplus-v19.webmanifest">';
  const oldWorker='navigator.serviceWorker.register("./sw.js")',newWorker='navigator.serviceWorker.register("./sw-v19.js")';
  try{const response=await fetch(source,{cache:"no-store"});if(!response.ok)throw new Error("원본 앱을 불러오지 못했습니다 (HTTP "+response.status+")");const original=await response.text();if([oldConfig,oldCloud,oldManifest,oldWorker].some(part=>original.indexOf(part)<0))throw new Error("안전한 버전 연결 지점을 찾지 못했습니다");document.open();document.write(original.replace(oldConfig,newConfig).replace(oldCloud,newCloud).replace(oldManifest,newManifest).replace(oldWorker,newWorker));document.close();}
  catch(error){document.body.innerHTML='<p>v19 준비에 실패했습니다. 기존 데이터는 변경되지 않았습니다.</p><p><a href="노트앱_v18.html">v18 열기</a></p><pre></pre>';document.querySelector("pre").textContent=String(error&&error.message||error);}
